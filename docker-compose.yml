version: '3.8'

services:
  easy-catalogs:
    build: .
    container_name: easy-catalogs
    ports:
      - "7171:7171"
    environment:
      - PORT=7171
      - ADDON_URL=http://localhost:7171
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - ./data:/app/data

  redis:
    image: redis:alpine
    container_name: easy-catalogs-redis
    command: ["redis-server", "--save", "60", "1"]
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data

volumes:
  redis-data:
